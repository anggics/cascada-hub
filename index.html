<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cascada Digital Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1582407947304-fd86f028f716?auto=format&fit=crop&w=1600&q=80');
            background-size: cover;
            background-position: center;
        }
    </style>
</head>
<body class="h-screen flex items-center justify-center p-4">

    <div class="bg-white/90 backdrop-blur-md rounded-[40px] p-10 shadow-2xl w-full max-w-md text-center">
        <div class="bg-blue-500 w-14 h-14 rounded-xl flex items-center justify-center mx-auto mb-6 shadow-lg shadow-blue-200">
            <i class="fas fa-home text-white text-2xl"></i>
        </div>

        <h1 class="text-2xl font-bold text-gray-800">Cascada Digital Hub</h1>
        <p class="text-gray-500 text-sm mb-8">Connected Living Starts at Cascada</p>

        <form id="loginForm" class="text-left space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700 mb-1">Email / Username</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                        <i class="far fa-envelope"></i>
                    </span>
                    <input type="text" id="username" placeholder="Enter email or username" required
                        class="w-full pl-10 pr-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
                </div>
            </div>

            <div>
                <div class="flex justify-between">
                    <label class="block text-sm font-semibold text-gray-700 mb-1">Password</label>
                    <a href="#" class="text-xs text-blue-500 hover:underline">Forgot password?</a>
                </div>
                <div class="relative">
                    <span class="absolute inset-y-0 left-3 flex items-center text-gray-400">
                        <i class="fas fa-lock"></i>
                    </span>
                    <input type="password" id="password" placeholder="••••••••" required
                        class="w-full pl-10 pr-10 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
                    <span class="absolute inset-y-0 right-3 flex items-center text-gray-400 cursor-pointer">
                        <i class="far fa-eye"></i>
                    </span>
                </div>
            </div>

            <button type="submit" class="w-full bg-[#0a1128] text-white py-3 rounded-xl font-semibold flex items-center justify-center gap-2 hover:bg-black transition">
                Login <i class="fas fa-arrow-right text-xs"></i>
            </button>
        </form>

        <p class="mt-6 text-sm text-gray-600">
            Don't have an account? <a href="#" class="text-blue-500 font-bold hover:underline">Register now</a>
        </p>

        <div class="mt-8 bg-blue-50 p-4 rounded-xl text-left border border-blue-100">
            <p class="text-xs font-bold text-blue-600 mb-1">Test Accounts:</p>
            <p class="text-[10px] text-blue-500">Admin: admin / admin123</p>
            <p class="text-[10px] text-blue-500">Resident: warga / warga123</p>
        </div>
    </div>

    <script>
        const GAS_URL = "https://script.google.com/macros/s/AKfycbwjkAyyHFzrHqY3SjwTZLjER-tZm1i6r4Ev68Pm46bnn3NilwVOBCf-JL458aPu4-JJ/exec"; // GANTI DENGAN URL DEPLOY GAS ANDA

        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = "Processing...";
            btn.disabled = true;

            const payload = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value
            };

            try {
                const response = await fetch(GAS_URL, {
                    method: 'POST',
                    mode: 'no-cors', // Penting untuk bypass CORS Apps Script
                    body: JSON.stringify(payload)
                });

                // Catatan: 'no-cors' tidak bisa membaca JSON response.
                // Untuk produksi yang lebih aman, gunakan library seperti 'gas-client' 
                // atau handle response di level frontend Apps Script.
                alert("Login request sent! (Check Sheet for validation)");
                
            } catch (error) {
                console.error(error);
                alert("Terjadi kesalahan koneksi.");
            } finally {
                btn.innerHTML = 'Login <i class="fas fa-arrow-right text-xs"></i>';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>

<div class="p-8">
    <div class="mb-8">
        <h2 class="text-2xl font-bold text-gray-800">Akun Saya</h2>
        <p class="text-sm text-gray-500">Perbarui foto profil Anda dan amankan akun Anda.</p>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <div class="bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100 text-center">
            <h3 class="text-sm font-bold text-gray-700 mb-6 text-left">Foto Profil</h3>
            <div class="w-32 h-32 bg-gray-100 rounded-full mx-auto mb-6 flex items-center justify-center border-4 border-blue-50">
                <i class="fas fa-user text-gray-300 text-5xl"></i>
            </div>
            <button class="w-full py-2.5 bg-blue-50 text-blue-500 rounded-xl text-sm font-bold mb-3 hover:bg-blue-100 transition">
                Pilih Foto...
            </button>
            <button class="w-full py-2.5 bg-[#0088cc] text-white rounded-xl text-sm font-bold shadow-md hover:bg-blue-600 transition">
                Simpan Foto
            </button>
        </div>

        <div class="lg:col-span-2 bg-white p-8 rounded-[2rem] shadow-sm border border-gray-100">
            <h3 class="text-sm font-bold text-gray-700 mb-6">Ubah Kata Sandi</h3>
            
            <form id="formChangePassword" class="space-y-6">
                <div>
                    <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">Kata Sandi Saat Ini</label>
                    <input type="password" id="oldPassword" placeholder="••••••••" required
                        class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">Kata Sandi Baru</label>
                        <input type="password" id="newPassword" placeholder="••••••••" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
                    </div>
                    <div>
                        <label class="block text-xs font-bold text-gray-500 mb-2 uppercase">Konfirmasi Kata Sandi Baru</label>
                        <input type="password" id="confirmPassword" placeholder="••••••••" required
                            class="w-full px-4 py-3 bg-gray-50 border border-gray-100 rounded-xl focus:ring-2 focus:ring-blue-400 outline-none transition">
                    </div>
                </div>

                <div class="flex justify-end pt-4">
                    <button type="submit" class="px-8 py-3 bg-[#0088cc] text-white rounded-xl text-sm font-bold shadow-lg hover:bg-blue-600 transition">
                        Perbarui Kata Sandi
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
